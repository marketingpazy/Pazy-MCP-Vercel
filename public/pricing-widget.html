<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cotización pazy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        /* Brand */
        --brand:         #00C6CC;
        --brand-dark:    #0B8698;
        --brand-light:   #ebfeff;
        --brand-border:  rgba(0, 198, 204, 0.25);
        /* Neutrals */
        --bg:            #ffffff;
        --bg-secondary:  #f7f7f8;
        --border:        #e5e5ea;
        --text:          #1c1c1e;
        --text-secondary:#6e6e73;
        --text-tertiary: #8e8e93;
        --shadow-sm:     0 1px 3px rgba(0,0,0,0.06);
        --shadow-md:     0 4px 12px rgba(0,0,0,0.08);
        /* Layout */
        --radius-sm:     8px;
        --radius-md:     12px;
        --radius-lg:     16px;
        --radius-full:   9999px;
        --font:          'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        --transition:    0.18s ease;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100%; background: var(--bg); }
      body { padding: 16px; font-family: var(--font); font-size: 15px; color: var(--text); -webkit-font-smoothing: antialiased; }

      main { width: 100%; max-width: 940px; margin: 0 auto; display: flex; flex-direction: column; gap: 16px; }

      /* ── Panel ── */
      .panel {
        background: var(--bg);
        border-radius: var(--radius-lg);
        padding: 16px;
        box-shadow: var(--shadow-sm);
        border: 1px solid var(--border);
      }

      /* ── Brand row ── */
      .brand-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 12px;
      }
      .brand-logo {
        width: 28px;
        height: 28px;
        border-radius: 6px;
        overflow: hidden;
        flex-shrink: 0;
      }
      .brand-logo svg { width: 100%; height: 100%; display: block; }
      .brand-name {
        font-size: 1rem;
        font-weight: 800;
        color: var(--brand-dark);
        letter-spacing: -0.01em;
      }

      /* ── Summary message ── */
      .summary-message { font-size: 0.88rem; color: var(--text-secondary); margin-bottom: 12px; }

      /* ── Summary grid ── */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
        gap: 8px;
      }
      .summary-item {
        background: var(--brand-light);
        border: 1px solid var(--brand-border);
        border-radius: var(--radius-md);
        padding: 10px 12px;
      }
      .summary-item .label {
        display: block;
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--brand-dark);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 3px;
      }
      .summary-item .value { font-size: 0.93rem; font-weight: 700; color: var(--text); }

      /* ── Cards slider ── */
      .cards {
        display: flex;
        flex-direction: row;
        gap: 16px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 6px;
        /* thin branded scrollbar */
        scrollbar-width: thin;
        scrollbar-color: var(--brand-border) transparent;
      }
      .cards::-webkit-scrollbar { height: 4px; }
      .cards::-webkit-scrollbar-track { background: transparent; }
      .cards::-webkit-scrollbar-thumb { background: var(--brand-border); border-radius: 4px; }
      .cards.dragging { cursor: grabbing; scroll-snap-type: none; }
      .cards { cursor: grab; }

      /* ── Quote card ── */
      .quote-card {
        /* Fixed width so cards peek on narrow viewports */
        flex: 0 0 300px;
        scroll-snap-align: start;
        background: var(--bg);
        border-radius: var(--radius-lg);
        border: 1px solid var(--brand-border);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
      }
      .quote-top {
        padding: 24px 20px 20px;
        background: var(--brand-light);
        border-bottom: 1px solid var(--brand-border);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 10px;
      }

      /* ── Badges ── */
      .quote-badges { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: var(--radius-full);
        padding: 4px 12px;
        font-size: 0.74rem;
        font-weight: 600;
        line-height: 1;
      }
      .badge-primary { background: var(--brand); color: #fff; }
      .badge-muted   { background: rgba(0,198,204,0.12); color: var(--brand-dark); border: 1px solid var(--brand-border); }

      .quote-title    { font-size: 1.05rem; font-weight: 700; color: var(--text); }
      .quote-subtitle { font-size: 0.84rem; color: var(--text-secondary); line-height: 1.4; }

      /* ── Price rows (stacked) ── */
      .price-row { display: flex; flex-direction: column; width: 100%; margin-top: 8px; }
      .price-box {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .price-box:last-child { border-bottom: none; }
      .price-label { font-size: 0.88rem; color: var(--text-secondary); font-weight: 400; line-height: 1.4; text-align: left; }
      .price-value { font-size: 1rem; font-weight: 700; color: var(--text); white-space: nowrap; }
      .price-value.savings { color: var(--brand-dark); }

      /* ── Card body ── */
      .quote-body { padding: 16px 20px 20px; display: flex; flex-direction: column; gap: 14px; flex: 1; }

      .section-title {
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--brand-dark);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 8px;
      }

      /* ── KV list ── */
      .kv-list { display: grid; gap: 0; }
      .kv-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.88rem;
        padding: 8px 0;
        border-bottom: 1px solid var(--border);
      }
      .kv-item:last-child { border-bottom: none; }
      .kv-key   { color: var(--text-secondary); }
      .kv-value { color: var(--text); font-weight: 600; text-align: right; }

      /* ── Services list ── */
      .bullet-list { display: flex; flex-direction: column; gap: 7px; list-style: none; }
      .bullet-list li {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 0.88rem;
        color: var(--text);
        line-height: 1.4;
      }
      .bullet-list li::before {
        content: "✓";
        color: var(--brand);
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* ── Warnings ── */
      .warning-list { display: flex; flex-direction: column; gap: 8px; }
      .warning {
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
        color: #9a3412;
        font-size: 0.88rem;
      }

      /* ── States ── */
      .empty-state, .error-state, .debug-state {
        padding: 20px;
        border-radius: var(--radius-md);
        text-align: center;
      }
      .empty-state { background: var(--brand-light); border: 1px solid var(--brand-border); color: var(--text-secondary); }
      .error-state { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
      .debug-state { background: var(--bg-secondary); border: 1px solid var(--border); color: var(--text-secondary); }
      .empty-state h3, .error-state h3, .debug-state h3 { margin-bottom: 6px; font-size: 0.95rem; }

      /* ── CTA Button ── */
      .actions { display: flex; }
      .button {
        width: 100%;
        appearance: none;
        border: none;
        border-radius: var(--radius-full);
        padding: 14px;
        font-family: var(--font);
        font-size: 0.95rem;
        font-weight: 700;
        background: var(--brand);
        color: #fff;
        cursor: pointer;
        transition: background var(--transition), transform 0.1s;
        letter-spacing: 0.01em;
      }
      .button:hover:not(:disabled)  { background: var(--brand-dark); }
      .button:active:not(:disabled) { transform: scale(0.98); }
      .button:disabled { opacity: 0.35; cursor: not-allowed; }

      .footer-note { font-size: 0.76rem; color: var(--text-tertiary); text-align: center; }

      /* ── Quote icon ── */
      .quote-icon {
        display: flex;
        justify-content: center;
        align-items: center;
        color: var(--brand-dark);
      }
      .quote-icon svg { height: 52px; width: auto; }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        body { padding: 12px; }
        .panel { padding: 14px; }
        .price-row { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="brand-row">
          <div class="brand-logo">
            <svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="256" height="256" rx="46" fill="#0B8698"/><path d="M132.004 48C120.606 48 109.907 51.0392 100.637 56.3707C100.41 52.5502 97.2978 49.5282 93.4957 49.5282H75.1583C71.2048 49.5282 68 52.7992 68 56.8343V216.702C68 220.729 71.2048 224 75.1583 224H76.1172C89.6684 224 100.654 212.788 100.654 198.965V170.281C109.915 175.604 120.615 178.644 132.004 178.644C167.35 178.644 196 149.402 196 113.326C196 77.2503 167.35 48 132.004 48ZM163.901 113.695V114.167C163.666 139.657 144.109 160.417 119.462 161.945H119.319C118.663 161.928 118.133 161.378 118.133 160.709C118.133 160.322 118.31 159.979 118.579 159.756C118.63 159.721 118.672 159.687 118.722 159.653C123.475 156.158 127.252 151.368 129.548 145.779C115.072 144.645 103.304 133.665 100.662 119.387C100.301 117.421 100.107 115.395 100.107 113.317C100.107 111.24 100.301 109.214 100.662 107.248C101.075 104.981 101.722 102.809 102.572 100.74C107.4 88.9951 118.764 80.7532 132.013 80.7532C149.055 80.7532 162.976 94.3953 163.868 111.575V111.643C163.893 112.27 163.91 112.897 163.91 113.532V113.687H163.901V113.695Z" fill="#DEFEFF"/></svg>
          </div>
          <span class="brand-name">pazy</span>
        </div>
      </section>

      <section id="status-container"></section>
      <section id="cards" class="cards"></section>
    </main>

    <script type="module">
      const statusContainerEl = document.querySelector("#status-container");
      const cardsEl = document.querySelector("#cards");

      const DEBUG_LOCAL = new URLSearchParams(window.location.search).get("debug") === "1";
      const DEBUG_PAYLOAD_URL = new URLSearchParams(window.location.search).get("payload") || "./pricing-widget.sample.json";

      let latestToolResult = null;
      const searchParams = new URLSearchParams(window.location.search);
      const DEBUG_MODE = searchParams.get("debug") === "1";
      const DEBUG_SAMPLE_URL = "./pricing-widget.sample.json";

      const extractStructuredContent = (payload) => {
        if (payload?.structuredContent?.result?.structuredContent) {
          return payload.structuredContent.result.structuredContent;
        }
        if (payload?.result?.structuredContent) {
          return payload.result.structuredContent;
        }
        if (payload?.toolResult?.structuredContent?.result?.structuredContent) {
          return payload.toolResult.structuredContent.result.structuredContent;
        }
        if (payload?.toolResult?.result?.structuredContent) {
          return payload.toolResult.result.structuredContent;
        }
        if (payload?.data?.structuredContent?.result?.structuredContent) {
          return payload.data.structuredContent.result.structuredContent;
        }
        if (payload?.data?.result?.structuredContent) {
          return payload.data.result.structuredContent;
        }
        if (payload?.structuredContent?.ok !== undefined) {
          return payload.structuredContent;
        }
        if (payload?.ok !== undefined) {
          return payload;
        }
        return null;
      };
      const formatCurrency = (value) => {
        if (typeof value !== "number" || Number.isNaN(value)) return "—";
        return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR", maximumFractionDigits: 2 }).format(value);
      };
      const formatDistance = (value) => {
        if (typeof value !== "number" || Number.isNaN(value)) return "—";
        return `${value.toFixed(2)} km`;
      };
      const formatBoolean = (value) => {
        if (value === true) return "Sí";
        if (value === false) return "No";
        return "—";
      };

      const getInputPersonas = (data) => {
        const personas = data?.input?.personas;
        return Array.isArray(personas) ? personas : [];
      };

      const getPersonaInputForQuote = (data, quote) => {
        const personas = getInputPersonas(data);
        const personaNumero = Number(quote?.persona_numero);
        return personas.find((p) => Number(p?.persona_numero) === personaNumero) || personas[0] || {};
      };

      const escapeHtml = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");

      const renderStatus = (data) => {
        const error = data?.error;
        const ok = Boolean(data?.ok);
        if (ok) {
          statusContainerEl.innerHTML = "";
          return;
        }
        if (error === "LIMIT_TRIES_REACHED") {
          statusContainerEl.innerHTML = `<div class="error-state"><h3>Has alcanzado el límite de consultas</h3><p>Ya no se pueden generar más cotizaciones en este chat.</p></div>`;
          return;
        }
        statusContainerEl.innerHTML = `<div class="error-state"><h3>No se pudo obtener la cotización</h3><p>${escapeHtml(data?.message || "Ha ocurrido un problema al consultar la API.")}</p></div>`;
      };

      const deriveCardTitle = (input) => {
        const raw = input?.destino_final || input?.tipo_funeral || "";
        const destino = raw.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const velatorio = input?.velatorio;
        if (destino === "incineracion") return velatorio ? "Incineración con velatorio" : "Incineración sin velatorio";
        if (destino === "inhumacion") return velatorio ? "Inhumación con velatorio" : "Inhumación sin velatorio";
        return null;
      };
      const renderQuotes = (data) => {
        const quotes = Array.isArray(data?.quotes) ? data.quotes : [];
        cardsEl.innerHTML = "";
        if (!data?.ok) return;
        if (!quotes.length) {
          cardsEl.innerHTML = `<div class="empty-state"><h3>Buscando.</h3><p>El sistema está buscando cotizaciones para sus datos.</p></div>`;
          return;
        }

        cardsEl.innerHTML = quotes.map((quote) => {
          const personaInput = getPersonaInputForQuote(data, quote);
          const cardTitle = deriveCardTitle(personaInput);

          const cuotas = Array.isArray(quote?.cuotas_mensuales) ? quote.cuotas_mensuales : [];
          const servicios = Array.isArray(quote?.servicios_incluidos) ? quote.servicios_incluidos : [];
          const avisos = Array.isArray(quote?.avisos) ? quote.avisos : [];
          const cuotasHtml = "";
          const serviciosHtml = servicios.length ? `<div><div class="section-title">Servicios incluidos</div><ul class="bullet-list">${servicios.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>` : "";
          const avisosHtml = avisos.length ? `<div><div class="section-title">Avisos</div><div class="warning-list">${avisos.map((item) => `<div class="warning">${escapeHtml(item)}</div>`).join("")}</div></div>` : "";
          const extrasHtml = quote?.admite_extras === false || quote?.tipo_restriccion_extras ? `<div><div class="section-title">Condiciones</div><ul class="bullet-list"><li>Extras permitidos: ${escapeHtml(formatBoolean(quote?.admite_extras))}</li>${quote?.tipo_restriccion_extras ? `<li>Restricción: ${escapeHtml(quote.tipo_restriccion_extras)}</li>` : ""}</ul></div>` : "";
          const velaIcon = `Cliente ${quote?.persona_numero ?? ""}`;

          return `<article class="quote-card"><div class="quote-top"><div class="quote-icon">${velaIcon}</div><div class="quote-title">${escapeHtml(cardTitle || quote?.nombre || "Cotización")}</div><div class="price-row"><div class="price-box"><span class="price-label">Precio total</span><span class="price-value">${escapeHtml(formatCurrency(quote?.precio_total))}</span></div><div class="price-box"><span class="price-label">Precio de descuento pago al contado</span><span class="price-value savings">${escapeHtml(formatCurrency(quote?.precio_contado))}</span></div></div></div><div class="quote-body">${serviciosHtml}${avisosHtml}${extrasHtml}<div class="actions"><button class="button" disabled type="button">Continuar</button></div><div class="footer-note">Esta vista muestra la información devuelta por la cotización actual.</div></div></article>`;
        }).join("");
      };

      const renderSummary = (data) => {
        const summary = data?.summary ?? {};
        const personas = getInputPersonas(data);
        const primera = personas[0] || {};

        const totalPersonas = personas.length;
        const extraPersonas = totalPersonas > 1 ? `<div class="summary-item"><span class="label">Personas</span><span class="value">${escapeHtml(totalPersonas)}</span></div>` : "";

        statusContainerEl.innerHTML = `
          <div class="panel">
            <div class="summary-message">${escapeHtml(summary?.mensaje || (data?.ok ? "Estas son las cotizaciones que hemos encontrado para ti." : "No se ha podido obtener una cotización."))}</div>
            <div class="summary-grid">
              ${extraPersonas}
              <div class="summary-item"><span class="label">Código postal</span><span class="value">${escapeHtml(primera.codigo_postal ?? "—")}</span></div>
              <div class="summary-item"><span class="label">Edad</span><span class="value">${escapeHtml(primera.edad ?? "—")}</span></div>
              <div class="summary-item"><span class="label">Tipo de funeral</span><span class="value">${escapeHtml(primera.destino_final ?? "—")}</span></div>
              <div class="summary-item"><span class="label">Velatorio</span><span class="value">${escapeHtml(formatBoolean(primera.velatorio))}</span></div>
              <div class="summary-item"><span class="label">Ceremonia</span><span class="value">${escapeHtml(formatBoolean(primera.ceremonia))}</span></div>
              <div class="summary-item"><span class="label">Resultados</span><span class="value">${escapeHtml(summary.total_resultados ?? 0)}</span></div>
            </div>
          </div>
        `;
      };

      const renderFromToolResult = (toolResult) => {
        latestToolResult = toolResult;

        const data = extractStructuredContent(toolResult);

        console.log("pricing-widget payload recibido:", toolResult);
        console.log("pricing-widget structuredContent:", data);

        if (!data) {
          renderSummary({});
          renderStatus({
            ok: false,
            error: "INVALID_WIDGET_PAYLOAD",
            message: "La interfaz recibió una respuesta, pero no encontró structuredContent.",
          });
          renderQuotes({});
          return;
        }

        renderSummary(data);
        renderStatus(data);
        renderQuotes(data);
      };

      let rpcId = 0;
      const pendingRequests = new Map();
      const rpcNotify = (method, params) => window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      const rpcRequest = (method, params) => new Promise((resolve, reject) => {
        const id = ++rpcId;
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
      });

      const initializeBridge = async () => {
        const appInfo = { name: "pricing-widget", version: "0.1.0" };
        const appCapabilities = {};
        const protocolVersion = "2026-01-26";
        await rpcRequest("ui/initialize", { appInfo, appCapabilities, protocolVersion });
        rpcNotify("ui/notifications/initialized", {});
      };

      const initializeLocalDebug = async () => {
        console.log("pricing-widget: arrancando en modo debug local", { payloadUrl: DEBUG_PAYLOAD_URL });
        try {
          const response = await fetch(DEBUG_PAYLOAD_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`No se pudo cargar ${DEBUG_PAYLOAD_URL}: ${response.status}`);
          }
          const payload = await response.json();
          console.log("pricing-widget: payload local cargado", payload);
          renderFromToolResult(payload);
        } catch (error) {
          console.error("pricing-widget: error cargando payload local", error);
          renderSummary({});
          renderStatus({ ok: false, message: `No se pudo cargar el payload local: ${error.message}`, error: "LOCAL_DEBUG_LOAD_FAILED" });
          renderQuotes({});
        }
      };

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent) return;
        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;
        if (typeof message.id === "number") {
          const pending = pendingRequests.get(message.id);
          if (!pending) return;
          pendingRequests.delete(message.id);
          if (message.error) {
            pending.reject(message.error);
            return;
          }
          pending.resolve(message.result);
          return;
        }
        if (typeof message.method !== "string") return;
        if (message.method === "ui/notifications/tool-result") {
          console.log("pricing-widget: ui/notifications/tool-result", message.params);
          renderFromToolResult(message.params);
        }
      }, { passive: true });

      renderSummary({ ok: true, input: {}, summary: { total_resultados: 0, mensaje: DEBUG_LOCAL ? "Modo debug local activo." : "Esperando una cotización..." } });
      renderStatus({ ok: true });
      renderQuotes({ ok: true, quotes: [] });

      if (DEBUG_LOCAL) {
        initializeLocalDebug();
      } else {
        const loadDebugSample = async () => {
          try {
            const response = await fetch(DEBUG_SAMPLE_URL, { cache: "no-store" });
            const payload = await response.json();
            console.log("pricing-widget debug sample:", payload);
            renderFromToolResult(payload);
          } catch (error) {
            console.error("No se pudo cargar el sample local:", error);
            renderSummary({});
            renderStatus({
              ok: false,
              error: "DEBUG_SAMPLE_LOAD_FAILED",
              message: "No se pudo cargar pricing-widget.sample.json",
            });
            renderQuotes({});
          }
        };

        if (DEBUG_MODE) {
          loadDebugSample();
        } else {
          initializeBridge().catch((error) => {
            console.error("No se pudo inicializar el bridge MCP Apps:", error);
            statusContainerEl.innerHTML = `
              <div class="error-state">
                <h3>Error al cargar la interfaz</h3>
                <p>No se pudo inicializar la comunicación con ChatGPT.</p>
              </div>
            `;
          });

          renderSummary({
            ok: true,
            input: {},
            summary: { total_resultados: 0, mensaje: "Esperando una cotización..." },
          });
          renderStatus({ ok: true });
          renderQuotes({ ok: true, quotes: [] });
        }
      }
      // ── Drag-to-scroll para el slider en desktop ──
      const slider = cardsEl;
      let isDragging = false, startX, startScrollLeft;

      slider.addEventListener('mousedown', (e) => {
        isDragging = true;
        startX = e.pageX - slider.offsetLeft;
        startScrollLeft = slider.scrollLeft;
        slider.classList.add('dragging');
      });
      window.addEventListener('mouseup', () => {
        isDragging = false;
        slider.classList.remove('dragging');
      });
      slider.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        e.preventDefault();
        const x = e.pageX - slider.offsetLeft;
        slider.scrollLeft = startScrollLeft - (x - startX) * 1.2;
      });
      slider.addEventListener('mouseleave', () => {
        isDragging = false;
        slider.classList.remove('dragging');
      });
    </script>
  </body>
</html>
