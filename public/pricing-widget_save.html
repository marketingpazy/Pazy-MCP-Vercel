<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cotización pazy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        --primary:       #00C6CC;
        --primary-dark:  #0B8698;
        --primary-mid:   #33B0B4;
        --primary-light: #B2EDEF;
        --bg:            #EBFEFF;
        --bg-subtle:     #DEFEFF;
        --white:         #ffffff;
        --text:          #374F65;
        --text-muted:    #5F7283;
        --text-light:    #8195AF;
        --border:        #B2EDEF;
        --shadow-sm:     0 1px 4px rgba(0,198,204,0.10);
        --shadow-md:     0 4px 20px rgba(0,198,204,0.14);
        --shadow-lg:     0 12px 40px rgba(0,198,204,0.18);
        --radius-sm:     8px;
        --radius-md:     14px;
        --radius-lg:     20px;
        --radius-full:   9999px;
        --font:          'Plus Jakarta Sans', system-ui, sans-serif;
        --transition:    0.2s ease;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { width: 100%; min-height: 100%; background: var(--bg); }
      body { padding: 20px; font-family: var(--font); font-size: 15px; color: var(--text); -webkit-font-smoothing: antialiased; }

      main { width: 100%; max-width: 940px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

      /* ── Panel ── */
      .panel {
        background: var(--white);
        border-radius: var(--radius-lg);
        padding: 24px;
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
      }

      /* ── Header ── */
      .header-top {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 16px;
      }
      .header-avatar {
        width: 48px;
        height: 48px;
        border-radius: 50%;
        overflow: hidden;
        flex-shrink: 0;
      }
      .header-avatar img,
      .header-avatar svg { width: 100%; height: 100%; display: block; }
      .header-label {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--primary-dark);
        margin-bottom: 2px;
      }
      .header-title { font-size: 1.25rem; font-weight: 800; color: var(--text); line-height: 1.2; }
      .header-subtitle { font-size: 0.88rem; color: var(--text-muted); margin-top: 4px; font-weight: 400; }

      /* ── Summary grid ── */
      .summary-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-top: 16px;
      }
      .summary-item {
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 12px 14px;
      }
      .summary-item .label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 4px;
      }
      .summary-item .value { font-size: 0.97rem; font-weight: 700; color: var(--text); }

      /* ── Cards grid ── */
      .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 18px; }

      /* ── Quote card ── */
      .quote-card {
        background: var(--white);
        border-radius: var(--radius-lg);
        border: 1px solid var(--border);
        overflow: hidden;
        box-shadow: var(--shadow-md);
        display: flex;
        flex-direction: column;
      }
      .quote-top {
        padding: 20px 20px 16px;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 8px;
      }

      /* ── Badges ── */
      .quote-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
      .badge {
        display: inline-flex;
        align-items: center;
        border-radius: var(--radius-full);
        padding: 5px 12px;
        font-size: 0.76rem;
        font-weight: 700;
        line-height: 1;
      }
      .badge-primary { background: var(--primary); color: var(--white); }
      .badge-muted   { background: var(--bg-subtle); color: var(--text-muted); border: 1px solid var(--border); }

      .quote-title    { font-size: 1.05rem; font-weight: 800; color: var(--text); }
      .quote-subtitle { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

      /* ── Price boxes ── */
      .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; margin-top: 4px; }
      .price-box {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: var(--radius-md);
        padding: 12px 14px;
        text-align: center;
      }
      .price-label { display: block; font-size: 0.75rem; font-weight: 600; color: var(--text-light); margin-bottom: 4px; }
      .price-value { font-size: 1.15rem; font-weight: 800; color: var(--primary-dark); }
      .price-value.savings { color: #16a34a; font-size: 1rem; }

      /* ── Card body ── */
      .quote-body { padding: 18px 20px 20px; display: flex; flex-direction: column; gap: 18px; flex: 1; }

      .section-title {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-light);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 10px;
      }

      /* ── KV list ── */
      .kv-list { display: grid; gap: 0; }
      .kv-item {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        font-size: 0.9rem;
        padding: 9px 0;
        border-bottom: 1px solid var(--bg);
      }
      .kv-item:last-child { border-bottom: none; }
      .kv-key   { color: var(--text-muted); }
      .kv-value { color: var(--text); font-weight: 600; text-align: right; }

      /* ── Services list ── */
      .bullet-list { display: flex; flex-direction: column; gap: 7px; list-style: none; }
      .bullet-list li {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        font-size: 0.88rem;
        color: var(--text);
        line-height: 1.4;
      }
      .bullet-list li::before {
        content: "✓";
        color: var(--primary);
        font-weight: 700;
        flex-shrink: 0;
        margin-top: 1px;
      }

      /* ── Warnings ── */
      .warning-list { display: flex; flex-direction: column; gap: 8px; }
      .warning {
        border-radius: var(--radius-sm);
        padding: 10px 12px;
        background: #fff7ed;
        border: 1px solid #fed7aa;
        color: #9a3412;
        font-size: 0.88rem;
      }

      /* ── States ── */
      .empty-state, .error-state, .debug-state {
        padding: 24px;
        border-radius: var(--radius-md);
        text-align: center;
      }
      .empty-state { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); }
      .error-state { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
      .debug-state { background: var(--bg-subtle); border: 1px solid var(--border); color: var(--primary-dark); }
      .empty-state h3, .error-state h3, .debug-state h3 { margin-bottom: 6px; font-size: 1rem; }

      /* ── CTA Button ── */
      .actions { display: flex; }
      .button {
        width: 100%;
        appearance: none;
        border: none;
        border-radius: var(--radius-md);
        padding: 14px;
        font-family: var(--font);
        font-size: 0.97rem;
        font-weight: 700;
        background: var(--primary);
        color: var(--white);
        cursor: pointer;
        transition: background var(--transition), transform 0.1s;
      }
      .button:hover:not(:disabled)  { background: var(--primary-dark); }
      .button:active:not(:disabled) { transform: scale(0.98); }
      .button:disabled { opacity: 0.45; cursor: not-allowed; }

      .footer-note { font-size: 0.78rem; color: var(--text-light); text-align: center; }

      /* ── Quote icon (vela) ── */
      .quote-icon {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        padding-bottom: 4px;
      }
      .quote-icon svg {
        height: 64px;
        width: auto;
      }

      /* ── Responsive ── */
      @media (max-width: 640px) {
        body { padding: 14px; }
        .panel { padding: 18px; }
        .price-row { grid-template-columns: 1fr; }
        .header-title { font-size: 1.1rem; }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <div class="header-top">
          <div class="header-avatar">
            <svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="256" height="256" rx="46" fill="#0B8698"/><path d="M132.004 48C120.606 48 109.907 51.0392 100.637 56.3707C100.41 52.5502 97.2978 49.5282 93.4957 49.5282H75.1583C71.2048 49.5282 68 52.7992 68 56.8343V216.702C68 220.729 71.2048 224 75.1583 224H76.1172C89.6684 224 100.654 212.788 100.654 198.965V170.281C109.915 175.604 120.615 178.644 132.004 178.644C167.35 178.644 196 149.402 196 113.326C196 77.2503 167.35 48 132.004 48ZM163.901 113.695V114.167C163.666 139.657 144.109 160.417 119.462 161.945H119.319C118.663 161.928 118.133 161.378 118.133 160.709C118.133 160.322 118.31 159.979 118.579 159.756C118.63 159.721 118.672 159.687 118.722 159.653C123.475 156.158 127.252 151.368 129.548 145.779C115.072 144.645 103.304 133.665 100.662 119.387C100.301 117.421 100.107 115.395 100.107 113.317C100.107 111.24 100.301 109.214 100.662 107.248C101.075 104.981 101.722 102.809 102.572 100.74C107.4 88.9951 118.764 80.7532 132.013 80.7532C149.055 80.7532 162.976 94.3953 163.868 111.575V111.643C163.893 112.27 163.91 112.897 163.91 113.532V113.687H163.901V113.695Z" fill="#DEFEFF"/></svg>
          </div>
          <div>
            <div class="header-label">pazy</div>
            <h1 class="header-title">Tu cotización personalizada</h1>
          </div>
        </div>
        <p id="summary-message" class="header-subtitle">Estamos preparando tus opciones disponibles.</p>
        <div id="summary-grid" class="summary-grid"></div>
      </section>

      <section id="status-container"></section>
      <section id="cards" class="cards"></section>
    </main>

    <script type="module">
      const summaryMessageEl = document.querySelector("#summary-message");
      const summaryGridEl = document.querySelector("#summary-grid");
      const statusContainerEl = document.querySelector("#status-container");
      const cardsEl = document.querySelector("#cards");

      const DEBUG_LOCAL = new URLSearchParams(window.location.search).get("debug") === "1";
      const DEBUG_PAYLOAD_URL = new URLSearchParams(window.location.search).get("payload") || "./pricing-widget.sample.json";

      let latestToolResult = null;
      const searchParams = new URLSearchParams(window.location.search);
      const DEBUG_MODE = searchParams.get("debug") === "1";
      const DEBUG_SAMPLE_URL = "./pricing-widget.sample.json";

      const extractStructuredContent = (payload) => {
        if (payload?.structuredContent?.result?.structuredContent) {
          return payload.structuredContent.result.structuredContent;
        }
        if (payload?.result?.structuredContent) {
          return payload.result.structuredContent;
        }
        if (payload?.toolResult?.structuredContent?.result?.structuredContent) {
          return payload.toolResult.structuredContent.result.structuredContent;
        }
        if (payload?.toolResult?.result?.structuredContent) {
          return payload.toolResult.result.structuredContent;
        }
        if (payload?.data?.structuredContent?.result?.structuredContent) {
          return payload.data.structuredContent.result.structuredContent;
        }
        if (payload?.data?.result?.structuredContent) {
          return payload.data.result.structuredContent;
        }
        if (payload?.structuredContent?.ok !== undefined) {
          return payload.structuredContent;
        }
        if (payload?.ok !== undefined) {
          return payload;
        }
        return null;
      };
      const formatCurrency = (value) => {
        if (typeof value !== "number" || Number.isNaN(value)) return "—";
        return new Intl.NumberFormat("es-ES", { style: "currency", currency: "EUR", maximumFractionDigits: 2 }).format(value);
      };
      const formatDistance = (value) => {
        if (typeof value !== "number" || Number.isNaN(value)) return "—";
        return `${value.toFixed(2)} km`;
      };
      const formatBoolean = (value) => {
        if (value === true) return "Sí";
        if (value === false) return "No";
        return "—";
      };
      const escapeHtml = (value) => String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");

      const renderSummary = (data) => {
        const summary = data?.summary ?? {};
        const input = data?.input ?? {};
        summaryMessageEl.textContent = summary?.mensaje || (data?.ok ? "Estas son las cotizaciones que hemos encontrado para ti." : "No se ha podido obtener una cotización.");
        const items = [
          { label: "Código postal", value: input.codigo_postal ?? "—" },
          { label: "Edad", value: input.edad ?? "—" },
          { label: "Tipo de funeral", value: input.destino_final ?? "—" },
          { label: "Velatorio", value: formatBoolean(input.velatorio) },
          { label: "Ceremonia", value: formatBoolean(input.ceremonia) },
          { label: "Resultados", value: summary.total_resultados ?? 0 },
        ];
        summaryGridEl.innerHTML = items.map((item) => `<div class="summary-item"><span class="label">${escapeHtml(item.label)}</span><span class="value">${escapeHtml(item.value)}</span></div>`).join("");
      };

      const renderStatus = (data) => {
        const error = data?.error;
        const ok = Boolean(data?.ok);
        if (ok) {
          statusContainerEl.innerHTML = DEBUG_LOCAL ? `<div class="debug-state"><h3>Modo debug local</h3><p>La vista usa un payload local y no inicializa el bridge de ChatGPT.</p></div>` : "";
          return;
        }
        if (error === "LIMIT_TRIES_REACHED") {
          statusContainerEl.innerHTML = `<div class="error-state"><h3>Has alcanzado el límite de consultas</h3><p>Ya no se pueden generar más cotizaciones en este chat.</p></div>`;
          return;
        }
        statusContainerEl.innerHTML = `<div class="error-state"><h3>No se pudo obtener la cotización</h3><p>${escapeHtml(data?.message || "Ha ocurrido un problema al consultar la API.")}</p></div>`;
      };

      const renderQuotes = (data) => {
        const quotes = Array.isArray(data?.quotes) ? data.quotes : [];
        cardsEl.innerHTML = "";
        if (!data?.ok) return;
        if (!quotes.length) {
          cardsEl.innerHTML = `<div class="empty-state"><h3>No hay cotizaciones disponibles</h3><p>No hemos encontrado resultados para los datos indicados.</p></div>`;
          return;
        }
        cardsEl.innerHTML = quotes.map((quote) => {
          const cuotas = Array.isArray(quote?.cuotas_mensuales) ? quote.cuotas_mensuales : [];
          const servicios = Array.isArray(quote?.servicios_incluidos) ? quote.servicios_incluidos : [];
          const avisos = Array.isArray(quote?.avisos) ? quote.avisos : [];
          const cuotasHtml = cuotas.length ? `<div><div class="section-title">Pago en 12 plazos</div><div class="kv-list">${cuotas.map((cuota) => `<div class="kv-item"><span class="kv-key">${escapeHtml(cuota?.label ?? "Plazo")}</span><span class="kv-value">${escapeHtml(formatCurrency(cuota?.cuota_mensual))}</span></div>`).join("")}</div></div>` : "";
          const serviciosHtml = servicios.length ? `<div><div class="section-title">Servicios incluidos</div><ul class="bullet-list">${servicios.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul></div>` : "";
          const avisosHtml = avisos.length ? `<div><div class="section-title">Avisos</div><div class="warning-list">${avisos.map((item) => `<div class="warning">${escapeHtml(item)}</div>`).join("")}</div></div>` : "";
          const extrasHtml = quote?.admite_extras === false || quote?.tipo_restriccion_extras ? `<div><div class="section-title">Condiciones</div><ul class="bullet-list"><li>Extras permitidos: ${escapeHtml(formatBoolean(quote?.admite_extras))}</li>${quote?.tipo_restriccion_extras ? `<li>Restricción: ${escapeHtml(quote.tipo_restriccion_extras)}</li>` : ""}</ul></div>` : "";
          const velaIcon = `<svg width="57" height="113" viewBox="0 0 57 113" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2.44869 106.835C0.560838 88.0155 0.601083 58.7968 2.44869 46.7873C16.2483 30.3084 56.0267 39.3967 56.0267 46.7871V106.835C56.0267 110.987 3.16098 113.935 2.44869 106.835Z" fill="#0B8698"/><path fill-rule="evenodd" clip-rule="evenodd" d="M27.3232 36.3981C27.4545 33.4859 27.8722 30.3735 28.7213 28.5054L30.4033 29.2699C29.7128 30.7891 29.2993 33.589 29.169 36.4813C29.0392 39.36 29.1989 42.0997 29.5351 43.4444L27.7427 43.8925C27.3398 42.2811 27.1914 39.324 27.3232 36.3981Z" fill="#0B8698"/><path d="M19.4002 19.1728C20.6605 13.8765 25.8673 12.7064 31.4101 2.5446C36.0291 7.16361 39.0896 11.7801 39.9483 16.8831C40.4345 19.7702 39.9676 22.7636 38.3148 25.6143C37.1456 27.6304 33.9356 32.4438 29.1151 32.8574C24.3321 33.2672 21.3526 28.4215 20.3596 26.6166C18.7988 23.7974 18.6881 22.1562 19.4002 19.1728Z" fill="#087D8E"/><path d="M23.5312 21.4811C23.8392 24.2525 25.1941 29.6105 28.1503 28.8715C31.1064 28.1324 34.3089 20.5573 35.5407 16.8621" stroke="white" stroke-width="2" stroke-linecap="round"/><path d="M8.96387 49.9177C18.6751 52.719 39.8904 56.6409 47.0618 49.9177" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>`;
          return `<article class="quote-card"><div class="quote-top"><div class="quote-icon">${velaIcon}</div><div class="quote-badges">${quote?.distancia_km != null ? `<span class="badge badge-muted">${escapeHtml(formatDistance(quote.distancia_km))}</span>` : ""}</div><div class="quote-title">${escapeHtml(quote?.nombre || "Cotización")}</div><div class="quote-subtitle">${escapeHtml([quote?.direccion, quote?.ciudad, quote?.provincia].filter(Boolean).join(" · ") || "Ubicación no disponible")}</div><div class="price-row"><div class="price-box"><span class="price-label">Precio total</span><span class="price-value">${escapeHtml(formatCurrency(quote?.precio_total))}</span></div><div class="price-box"><span class="price-label">Descuento pago al contado</span><span class="price-value savings">${escapeHtml(formatCurrency(quote?.precio_contado))}</span></div></div></div><div class="quote-body"><div><div class="section-title">Resumen</div><div class="kv-list"><div class="kv-item"><span class="kv-key">Ciudad</span><span class="kv-value">${escapeHtml(quote?.ciudad || "—")}</span></div><div class="kv-item"><span class="kv-key">Provincia</span><span class="kv-value">${escapeHtml(quote?.provincia || "—")}</span></div><div class="kv-item"><span class="kv-key">Distancia</span><span class="kv-value">${escapeHtml(formatDistance(quote?.distancia_km))}</span></div></div></div>${cuotasHtml}${serviciosHtml}${avisosHtml}${extrasHtml}<div class="actions"><button class="button" disabled type="button">Continuar</button></div><div class="footer-note">Esta vista muestra la información devuelta por la cotización actual.</div></div></article>`;
        }).join("");
      };

      const renderFromToolResult = (toolResult) => {
        latestToolResult = toolResult;

        const data = extractStructuredContent(toolResult);

        console.log("pricing-widget payload recibido:", toolResult);
        console.log("pricing-widget structuredContent:", data);

        if (!data) {
          renderSummary({});
          renderStatus({
            ok: false,
            error: "INVALID_WIDGET_PAYLOAD",
            message: "La interfaz recibió una respuesta, pero no encontró structuredContent.",
          });
          renderQuotes({});
          return;
        }

        renderSummary(data);
        renderStatus(data);
        renderQuotes(data);
      };

      let rpcId = 0;
      const pendingRequests = new Map();
      const rpcNotify = (method, params) => window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");
      const rpcRequest = (method, params) => new Promise((resolve, reject) => {
        const id = ++rpcId;
        pendingRequests.set(id, { resolve, reject });
        window.parent.postMessage({ jsonrpc: "2.0", id, method, params }, "*");
      });

      const initializeBridge = async () => {
        const appInfo = { name: "pricing-widget", version: "0.1.0" };
        const appCapabilities = {};
        const protocolVersion = "2026-01-26";
        await rpcRequest("ui/initialize", { appInfo, appCapabilities, protocolVersion });
        rpcNotify("ui/notifications/initialized", {});
      };

      const initializeLocalDebug = async () => {
        console.log("pricing-widget: arrancando en modo debug local", { payloadUrl: DEBUG_PAYLOAD_URL });
        try {
          const response = await fetch(DEBUG_PAYLOAD_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`No se pudo cargar ${DEBUG_PAYLOAD_URL}: ${response.status}`);
          }
          const payload = await response.json();
          console.log("pricing-widget: payload local cargado", payload);
          renderFromToolResult(payload);
        } catch (error) {
          console.error("pricing-widget: error cargando payload local", error);
          renderSummary({});
          renderStatus({ ok: false, message: `No se pudo cargar el payload local: ${error.message}`, error: "LOCAL_DEBUG_LOAD_FAILED" });
          renderQuotes({});
        }
      };

      window.addEventListener("message", (event) => {
        if (event.source !== window.parent) return;
        const message = event.data;
        if (!message || message.jsonrpc !== "2.0") return;
        if (typeof message.id === "number") {
          const pending = pendingRequests.get(message.id);
          if (!pending) return;
          pendingRequests.delete(message.id);
          if (message.error) {
            pending.reject(message.error);
            return;
          }
          pending.resolve(message.result);
          return;
        }
        if (typeof message.method !== "string") return;
        if (message.method === "ui/notifications/tool-result") {
          console.log("pricing-widget: ui/notifications/tool-result", message.params);
          renderFromToolResult(message.params);
        }
      }, { passive: true });

      renderSummary({ ok: true, input: {}, summary: { total_resultados: 0, mensaje: DEBUG_LOCAL ? "Modo debug local activo." : "Esperando una cotización..." } });
      renderStatus({ ok: true });
      renderQuotes({ ok: true, quotes: [] });

      if (DEBUG_LOCAL) {
        initializeLocalDebug();
      } else {
        const loadDebugSample = async () => {
          try {
            const response = await fetch(DEBUG_SAMPLE_URL, { cache: "no-store" });
            const payload = await response.json();
            console.log("pricing-widget debug sample:", payload);
            renderFromToolResult(payload);
          } catch (error) {
            console.error("No se pudo cargar el sample local:", error);
            renderSummary({});
            renderStatus({
              ok: false,
              error: "DEBUG_SAMPLE_LOAD_FAILED",
              message: "No se pudo cargar pricing-widget.sample.json",
            });
            renderQuotes({});
          }
        };

        if (DEBUG_MODE) {
          loadDebugSample();
        } else {
          initializeBridge().catch((error) => {
            console.error("No se pudo inicializar el bridge MCP Apps:", error);
            statusContainerEl.innerHTML = `
              <div class="error-state">
                <h3>Error al cargar la interfaz</h3>
                <p>No se pudo inicializar la comunicación con ChatGPT.</p>
              </div>
            `;
          });

          renderSummary({
            ok: true,
            input: {},
            summary: { total_resultados: 0, mensaje: "Esperando una cotización..." },
          });
          renderStatus({ ok: true });
          renderQuotes({ ok: true, quotes: [] });
        }
      }
    </script>
  </body>
</html>
