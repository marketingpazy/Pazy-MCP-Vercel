marca_pazy:

  cultura:
    valores:
      - cercania
      - claridad
      - respeto
      - empatia
      - transparencia

    filosofia: >
      Planificar la despedida no es un acto triste, sino una forma de
      amor y cuidado hacia las personas que queremos.

  cliente_objetivo:
    descripcion: >
      Personas que desean planificar con serenidad y buscan soluciones
      claras, humanas y transparentes para organizar el futuro.

    caracteristicas:
      - valoran la claridad y la transparencia
      - prefieren explicaciones sencillas
      - buscan acompañamiento humano
      - aprecian la personalización

  voz_de_marca:
    atributos:
      - calida
      - empatica
      - clara
      - serena

    estilo_comunicacion:
      usar:
        - lenguaje sencillo
        - tono humano y respetuoso
        - explicaciones claras paso a paso
        - transmitir tranquilidad

      evitar:
        - dramatismo
        - lenguaje fúnebre
        - tecnicismos innecesarios
        - promesas que no se puedan cumplir

  sensacion_que_transmitimos:
    - calma
    - confianza
    - serenidad
    - acompañamiento
    - claridad

  proposito:
    descripcion: >
      Ayudar a las personas a planificar su despedida con tranquilidad,
      facilitando decisiones difíciles y reduciendo cargas emocionales
      y económicas para las familias.

  diferenciadores:
    - alternativa al seguro de decesos tradicional
    - combinación de tecnología y humanidad
    - planificación flexible
    - libertad para decidir cada detalle