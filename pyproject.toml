requires-python = ">=3.11"
readme = "README.md"
license = {text = "MIT"}


[tool.pdm]
distribution = true

[build-system]
requires = ["pdm-backend"]
build-backend = "pdm.backend"

[tool.pdm.scripts]
dev = "python ./dev/server.py"
dev_ui = "python ./dev/server_ui.py"

test_tool1 = "python ./tests/test_client_tool1.py"
test_tool2 = "python ./tests/test_client_tool2.py"
test_ui = "python ./tests/test_client_pricing_debug.py"